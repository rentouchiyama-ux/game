<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Elemental 2D Battle - Advanced Mobile UI</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #08101f;
      color: #eaf2ff;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #gameWrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(91, 129, 255, 0.12), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255, 180, 80, 0.10), transparent 25%),
        linear-gradient(180deg, #17264c 0%, #0f1732 45%, #091121 100%);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ---------------- HUD ---------------- */

    #topHud {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      pointer-events: none;
    }

    .hudCard {
      background: linear-gradient(180deg, rgba(18,28,56,0.74), rgba(9,14,30,0.68));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    #playerHud {
      width: min(420px, calc(100vw - 140px));
      padding: 10px 12px;
    }

    #enemyHud {
      width: min(300px, 42vw);
      padding: 10px 12px;
    }

    .hudTitle {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ecf3ff;
      margin-bottom: 8px;
    }

    .barBox {
      margin-bottom: 8px;
    }

    .labelRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 11px;
      color: #cfdbff;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.20);
    }

    .fill {
      height: 100%;
      width: 50%;
      transition: width 0.12s linear;
      border-radius: 999px;
    }

    .hp { background: linear-gradient(90deg, #2edb85, #88ffbd); }
    .energy { background: linear-gradient(90deg, #4b8fff, #9ad6ff); }
    .enemyHp { background: linear-gradient(90deg, #ff6767, #ffb0b0); }
    .stamina { background: linear-gradient(90deg, #ffcc45, #fff0ab); }

    #reactionMiniLog {
      position: absolute;
      top: 130px;
      right: 12px;
      z-index: 11;
      width: min(270px, 46vw);
      max-height: 180px;
      overflow: hidden;
      pointer-events: none;
    }

    .logItem {
      font-size: 12px;
      color: #eff4ff;
      margin-bottom: 6px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(10,16,34,0.56);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------------- Controls ---------------- */

    #mobileControls {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      touch-action: none;
    }

    /* バーチャルスティック */
    #joystickArea {
      position: absolute;
      left: 12px;
      bottom: 90px;
      width: 200px;
      height: 200px;
      pointer-events: auto;
      touch-action: none;
    }

    #joystickBase {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.18) 100%),
        rgba(17, 27, 58, 0.46);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow:
        inset 0 3px 8px rgba(255,255,255,0.05),
        0 10px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystickRing {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.10);
    }

    #joystickKnob {
      position: absolute;
      left: 68px;
      top: 68px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.24) 100%),
        rgba(62, 92, 173, 0.76);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.08),
        0 8px 20px rgba(0,0,0,0.22);
      pointer-events: none;
      transition: transform 0.03s linear;
    }

    #joystickHint {
      position: absolute;
      width: 100%;
      text-align: center;
      bottom: -8px;
      font-size: 11px;
      color: rgba(230,240,255,0.78);
      text-shadow: 0 1px 2px rgba(0,0,0,0.32);
      pointer-events: none;
    }

    /* 右下アクション */
    #actionPad {
      position: absolute;
      right: 12px;
      bottom: 76px;
      width: 248px;
      height: 248px;
      pointer-events: auto;
      touch-action: none;
    }

    .touchBtn {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.08),
        0 10px 24px rgba(0,0,0,0.26);
      backdrop-filter: blur(8px);
      text-shadow: 0 1px 2px rgba(0,0,0,0.28);
    }

    .touchBtn.active,
    .touchBtn:active {
      transform: scale(0.96);
      filter: brightness(1.14);
    }

    .touchBtn .sub {
      display: block;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.92;
      margin-top: 1px;
    }

    #btnAttack {
      width: 96px;
      height: 96px;
      right: 0;
      bottom: 8px;
      font-size: 18px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.22) 100%),
        rgba(205, 88, 88, 0.74);
    }

    #btnAttackCharge {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      pointer-events: none;
    }

    #btnAttackCharge::before {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: var(--charge, 0%);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,230,140,0.30));
    }

    #btnSkill {
      width: 74px;
      height: 74px;
      right: 96px;
      bottom: 52px;
      font-size: 13px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.22) 100%),
        rgba(74, 124, 255, 0.76);
    }

    #btnBurst {
      width: 88px;
      height: 88px;
      right: 24px;
      bottom: 114px;
      font-size: 15px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.22) 100%),
        rgba(255, 191, 62, 0.78);
      overflow: hidden;
    }

    #btnBurst.ready {
      animation: burstPulse 1.05s infinite ease-in-out;
      box-shadow:
        0 0 0 0 rgba(255,210,80,0.42),
        0 0 24px rgba(255,212,92,0.42),
        inset 0 2px 8px rgba(255,255,255,0.12),
        0 10px 24px rgba(0,0,0,0.26);
    }

    #btnBurst.ready::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,227,131,0.55);
      animation: ringPulse 1.2s infinite ease-out;
    }

    @keyframes burstPulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.06); filter: brightness(1.18); }
    }

    @keyframes ringPulse {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.18); opacity: 0; }
    }

    #btnDodge {
      width: 60px;
      height: 60px;
      right: 172px;
      bottom: 8px;
      font-size: 12px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.22) 100%),
        rgba(90, 202, 132, 0.72);
    }

    /* 右上 */
    #topButtons {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 21;
      pointer-events: auto;
      display: flex;
      gap: 8px;
    }

    .topBtn {
      min-width: 82px;
      height: 40px;
      border-radius: 999px;
      padding: 0 14px;
      position: static;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.15), rgba(255,255,255,0.04) 45%, rgba(0,0,0,0.22) 100%),
        rgba(28, 42, 92, 0.78);
      font-size: 13px;
    }

    /* 下中央 キャラ切替 */
    #partySwitchBar {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 22;
      display: flex;
      gap: 10px;
      pointer-events: auto;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(9,15,30,0.42);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.22);
    }

    .partyIcon {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0.04) 48%, rgba(0,0,0,0.22) 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #fff;
      font-weight: 700;
      box-shadow: inset 0 2px 6px rgba(255,255,255,0.06), 0 6px 14px rgba(0,0,0,0.18);
    }

    .partyIcon.active {
      transform: translateY(-4px) scale(1.06);
      box-shadow:
        0 0 18px rgba(255,255,255,0.12),
        inset 0 2px 6px rgba(255,255,255,0.08),
        0 10px 18px rgba(0,0,0,0.20);
    }

    .partyIcon.dead {
      filter: grayscale(1) brightness(0.55);
      opacity: 0.6;
    }

    .partyFace {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .partyFace .faceHead {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.90);
      margin-bottom: 2px;
    }

    .partyFace .faceBody {
      width: 22px;
      height: 14px;
      border-radius: 8px 8px 6px 6px;
    }

    .partyShortName {
      position: absolute;
      bottom: 4px;
      font-size: 9px;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 2px rgba(0,0,0,0.30);
    }

    .partyHpRing {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      pointer-events: none;
      background:
        conic-gradient(#5dff9d var(--hpdeg, 100%), rgba(255,255,255,0.08) 0);
      -webkit-mask: radial-gradient(circle, transparent 66%, black 68%);
              mask: radial-gradient(circle, transparent 66%, black 68%);
      opacity: 0.9;
    }

    /* result */
    #bigMessage {
      position: absolute;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      z-index: 30;
      min-width: 290px;
      max-width: 86vw;
      text-align: center;
      background: rgba(7, 12, 26, 0.90);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      display: none;
      backdrop-filter: blur(10px);
    }

    #bigMessage.show { display: block; }

    #bigMessage h2 {
      margin: 0 0 10px;
      font-size: 30px;
      letter-spacing: 0.04em;
    }

    #bigMessage p {
      margin: 6px 0;
      color: #d2dcff;
      line-height: 1.7;
      font-size: 14px;
    }

    #footerMini {
      position: absolute;
      left: 14px;
      bottom: 18px;
      z-index: 9;
      font-size: 11px;
      color: rgba(223,235,255,0.72);
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.26);
    }

    @media (max-width: 820px) {
      #playerHud {
        width: calc(100vw - 120px);
      }

      #enemyHud {
        display: none;
      }

      #reactionMiniLog {
        top: 110px;
        width: min(220px, 44vw);
      }
    }

    @media (max-width: 560px) {
      #playerHud {
        width: calc(100vw - 20px);
      }

      #joystickArea {
        left: 4px;
        bottom: 92px;
        transform: scale(0.92);
        transform-origin: left bottom;
      }

      #actionPad {
        right: 4px;
        bottom: 86px;
        transform: scale(0.92);
        transform-origin: right bottom;
      }

      #partySwitchBar {
        bottom: 10px;
        gap: 8px;
        padding: 7px 8px;
      }

      .partyIcon {
        width: 50px;
        height: 50px;
      }

      #footerMini {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game"></canvas>

    <div id="topHud">
      <div id="playerHud" class="hudCard">
        <div class="hudTitle">2D元素アクション</div>

        <div class="barBox">
          <div class="labelRow">
            <span>操作キャラHP</span>
            <span id="playerHpText">0 / 0</span>
          </div>
          <div class="bar"><div id="playerHpFill" class="fill hp"></div></div>
        </div>

        <div class="barBox">
          <div class="labelRow">
            <span>元素エネルギー</span>
            <span id="playerEnergyText">0 / 100</span>
          </div>
          <div class="bar"><div id="playerEnergyFill" class="fill energy"></div></div>
        </div>

        <div class="barBox">
          <div class="labelRow">
            <span>スタミナ</span>
            <span id="playerStaminaText">0 / 100</span>
          </div>
          <div class="bar"><div id="playerStaminaFill" class="fill stamina"></div></div>
        </div>

        <div class="barBox" style="margin-bottom:0;">
          <div class="labelRow">
            <span>ボスHP</span>
            <span id="enemyHpText">0 / 0</span>
          </div>
          <div class="bar"><div id="enemyHpFill" class="fill enemyHp"></div></div>
        </div>
      </div>

      <div id="enemyHud" class="hudCard">
        <div class="hudTitle">ボス情報</div>
        <div style="font-size:13px; line-height:1.7; color:#dce6ff;">
          深淵の模造王<br>
          元素反応を重ねると大ダメージ<br>
          爆発ボタンが光ったら撃ちどころ
        </div>
      </div>
    </div>

    <div id="reactionMiniLog"></div>

    <div id="mobileControls">
      <div id="joystickArea">
        <div id="joystickBase">
          <div id="joystickRing"></div>
        </div>
        <div id="joystickKnob"></div>
        <div id="joystickHint">ドラッグで移動 / 上でジャンプ</div>
      </div>

      <div id="actionPad">
        <button id="btnAttack" class="touchBtn" aria-label="攻撃">
          <div>
            攻撃
            <span class="sub">長押し: 重撃</span>
          </div>
          <div id="btnAttackCharge"></div>
        </button>
        <button id="btnSkill" class="touchBtn" aria-label="スキル">
          <div>スキル</div>
        </button>
        <button id="btnBurst" class="touchBtn" aria-label="爆発">
          <div>爆発</div>
        </button>
        <button id="btnDodge" class="touchBtn" aria-label="回避">
          <div>回避</div>
        </button>
      </div>
    </div>

    <div id="topButtons">
      <button id="btnRestart" class="touchBtn topBtn" aria-label="再挑戦">再挑戦</button>
    </div>

    <div id="partySwitchBar"></div>

    <div id="bigMessage">
      <h2 id="bigMessageTitle">VICTORY</h2>
      <p id="bigMessageBody"></p>
      <p>右上の「再挑戦」でリスタート</p>
    </div>

    <div id="footerMini">左はスティック、右は戦闘。スマホで戦う形に進化。</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    const groundY = () => H() - 120;

    const GRAVITY = 0.72;
    const FRICTION = 0.82;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function rectsHit(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    // =========================================================
    // UI refs
    // =========================================================
    const playerHpFill = document.getElementById("playerHpFill");
    const playerHpText = document.getElementById("playerHpText");
    const playerEnergyFill = document.getElementById("playerEnergyFill");
    const playerEnergyText = document.getElementById("playerEnergyText");
    const playerStaminaFill = document.getElementById("playerStaminaFill");
    const playerStaminaText = document.getElementById("playerStaminaText");
    const enemyHpFill = document.getElementById("enemyHpFill");
    const enemyHpText = document.getElementById("enemyHpText");

    const reactionMiniLog = document.getElementById("reactionMiniLog");
    const bigMessage = document.getElementById("bigMessage");
    const bigMessageTitle = document.getElementById("bigMessageTitle");
    const bigMessageBody = document.getElementById("bigMessageBody");
    const btnBurst = document.getElementById("btnBurst");
    const btnAttackCharge = document.getElementById("btnAttackCharge");
    const partySwitchBar = document.getElementById("partySwitchBar");

    function addLog(text) {
      const div = document.createElement("div");
      div.className = "logItem";
      div.textContent = text;
      reactionMiniLog.prepend(div);
      while (reactionMiniLog.children.length > 6) {
        reactionMiniLog.removeChild(reactionMiniLog.lastChild);
      }
    }

    function showMessage(title, body) {
      bigMessageTitle.textContent = title;
      bigMessageBody.textContent = body;
      bigMessage.classList.add("show");
    }

    function hideMessage() {
      bigMessage.classList.remove("show");
    }

    // =========================================================
    // Input
    // =========================================================
    const input = {
      moveX: 0,
      jumpQueued: false,
      attackQueued: false,
      chargedAttackQueued: false,
      skillQueued: false,
      burstQueued: false,
      dodgeQueued: false,
      restartQueued: false,
      switchTo: null
    };

    function consumeInput(key) {
      if (input[key]) {
        input[key] = false;
        return true;
      }
      return false;
    }

    // -------- バーチャルスティック --------
    const joystickArea = document.getElementById("joystickArea");
    const joystickKnob = document.getElementById("joystickKnob");

    let joystickActive = false;
    let joystickPointerId = null;
    let joystickCenter = { x: 100, y: 100 };
    let joystickRadius = 54;
    let jumpTriggeredByStick = false;

    function updateJoystickLayout() {
      const rect = joystickArea.getBoundingClientRect();
      joystickCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
      joystickRadius = Math.min(rect.width, rect.height) * 0.27;
    }
    window.addEventListener("resize", updateJoystickLayout);
    updateJoystickLayout();

    function resetJoystick() {
      joystickActive = false;
      joystickPointerId = null;
      input.moveX = 0;
      jumpTriggeredByStick = false;
      joystickKnob.style.transform = `translate(0px, 0px)`;
      joystickArea.releasePointerCapture?.(joystickPointerId);
    }

    function handleJoystickMove(clientX, clientY) {
      const dx = clientX - joystickCenter.x;
      const dy = clientY - joystickCenter.y;
      const len = Math.hypot(dx, dy);
      const maxLen = joystickRadius;

      let nx = dx;
      let ny = dy;
      if (len > maxLen) {
        nx = dx / len * maxLen;
        ny = dy / len * maxLen;
      }

      joystickKnob.style.transform = `translate(${nx}px, ${ny}px)`;
      input.moveX = clamp(nx / maxLen, -1, 1);

      if (ny < -maxLen * 0.72 && !jumpTriggeredByStick) {
        input.jumpQueued = true;
        jumpTriggeredByStick = true;
      }
      if (ny > -maxLen * 0.4) {
        jumpTriggeredByStick = false;
      }
    }

    joystickArea.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      updateJoystickLayout();

      joystickPointerId = e.pointerId;
      joystickArea.setPointerCapture(e.pointerId);
      handleJoystickMove(e.clientX, e.clientY);
    });

    joystickArea.addEventListener("pointermove", (e) => {
      if (!joystickActive || e.pointerId !== joystickPointerId) return;
      e.preventDefault();
      handleJoystickMove(e.clientX, e.clientY);
    });

    const endJoystick = (e) => {
      if (!joystickActive) return;
      if (e.pointerId !== undefined && e.pointerId !== joystickPointerId) return;
      resetJoystick();
    };
    joystickArea.addEventListener("pointerup", endJoystick);
    joystickArea.addEventListener("pointercancel", endJoystick);

    // -------- 攻撃ボタン：短押し/長押し --------
    const btnAttack = document.getElementById("btnAttack");
    let attackPressing = false;
    let attackPointerId = null;
    let attackPressStart = 0;
    const CHARGE_THRESHOLD = 320;

    btnAttack.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      attackPressing = true;
      attackPointerId = e.pointerId;
      attackPressStart = performance.now();
      btnAttack.classList.add("active");
      btnAttackCharge.style.setProperty("--charge", "0%");
      btnAttack.setPointerCapture(e.pointerId);
    });

    function releaseAttack(e) {
      if (!attackPressing) return;
      if (e.pointerId !== undefined && e.pointerId !== attackPointerId) return;

      const held = performance.now() - attackPressStart;
      attackPressing = false;
      btnAttack.classList.remove("active");
      btnAttackCharge.style.setProperty("--charge", "0%");
      if (held >= CHARGE_THRESHOLD) {
        input.chargedAttackQueued = true;
      } else {
        input.attackQueued = true;
      }
    }

    btnAttack.addEventListener("pointerup", (e) => {
      e.preventDefault();
      releaseAttack(e);
    });
    btnAttack.addEventListener("pointercancel", releaseAttack);
    btnAttack.addEventListener("lostpointercapture", releaseAttack);

    function simpleTapButton(id, callback) {
      const el = document.getElementById(id);
      el.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        el.classList.add("active");
      });
      el.addEventListener("pointerup", (e) => {
        e.preventDefault();
        el.classList.remove("active");
        callback();
      });
      el.addEventListener("pointercancel", () => el.classList.remove("active"));
      el.addEventListener("pointerleave", () => el.classList.remove("active"));
    }

    function spawnParticle(x, y, color, count = 10, spread = 2.5, speed = 4) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const s = Math.random() * speed;
        particles.push({
          x, y,
          vx: Math.cos(angle) * s * spread,
          vy: Math.sin(angle) * s * spread,
          life: rand(18, 40),
          maxLife: rand(18, 40),
          size: rand(2, 6),
          color
        });

    function spawnDamageText(x, y, text, color = "#ffffff", scale = 1) {

    function elementColor(el) {
      switch (el) {
        case "pyro": return "#ff7a3d";
        case "hydro": return "#4ca8ff";
        case "electro": return "#b07cff";
        case "cryo": return "#8de7ff";
        default: return "#ffffff";
      }
    }

    function elementName(el) {
      switch (el) {
        case "pyro": return "炎";
        case "hydro": return "水";
        case "electro": return "雷";
        case "cryo": return "氷";
        default: return "無";
      }

    // =========================================================
    // Reactions
    // =========================================================
    function getReaction(a, b) {
      const set = [a, b].sort().join("+");
      switch (set) {
        case "hydro+pyro": return { name: "蒸発", multiplier: 1.8, extra: "burst" };
        case "cryo+pyro": return { name: "溶解", multiplier: 2.0, extra: "burst" };
        case "electro+hydro": return { name: "感電", multiplier: 1.25, extra: "dot" };
        case "cryo+electro": return { name: "超電導", multiplier: 1.2, extra: "shred" };
        default: return null;
      }
    }

    function applyElementAura(target, element, duration = 180) {
      if (!element) return;
      if (!target.elementAura) {
        target.elementAura = element;
        target.auraTimer = duration;
        addLog(`${elementName(element)}元素付着`);
        return { reacted: false };
      }

      if (target.elementAura === element) {
        target.auraTimer = Math.max(target.auraTimer, duration);
        return { reacted: false };
      }

      const reaction = getReaction(target.elementAura, element);
      if (reaction) {
        const oldAura = target.elementAura;
        target.elementAura = null;
        target.auraTimer = 0;
        addLog(`${elementName(oldAura)} + ${elementName(element)} → ${reaction.name}`);
        return { reacted: true, reaction };
      }

      target.elementAura = element;
      target.auraTimer = duration;
      return { reacted: false };
    }

    function dealDamageToEnemy(amount, hitElement = null, x = enemy.x + enemy.w / 2, y = enemy.y + 20) {
      let finalDamage = amount;
      let reactionResult = null;

      if (hitElement) {
        const auraRes = applyElementAura(enemy, hitElement, 220);
        if (auraRes.reacted) {
          reactionResult = auraRes.reaction;
          finalDamage *= auraRes.reaction.multiplier;

          if (auraRes.reaction.extra === "dot") {
            for (let i = 0; i < 3; i++) {
              setTimeout(() => {
                if (enemy.hp > 0) {
                  enemy.hp = Math.max(0, enemy.hp - 9);
                  spawnDamageText(enemy.x + enemy.w / 2 + rand(-18, 18), enemy.y + 15 + rand(-12, 12), "9", "#9dd8ff", 0.9);
                  spawnParticle(enemy.x + enemy.w / 2, enemy.y + 40, "#73b8ff", 8, 1.2, 2.2);
                }
              }, 180 * (i + 1));
            }
          }

          if (auraRes.reaction.extra === "shred") {
            enemy.hurtFlash = 16;
            enemy.defShredTimer = 180;
          }
        }
      }

      if (enemy.defShredTimer > 0) finalDamage *= 1.18;

      finalDamage = Math.round(finalDamage);
      enemy.hp = Math.max(0, enemy.hp - finalDamage);
      enemy.hurtFlash = 8;

      spawnDamageText(x + rand(-16, 16), y + rand(-10, 10), String(finalDamage), reactionResult ? "#ffe27d" : "#ffffff", reactionResult ? 1.18 : 1);
      spawnParticle(x, y, hitElement ? elementColor(hitElement) : "#ffffff", reactionResult ? 18 : 10, 1.8, reactionResult ? 5.5 : 3.3);

      activeChar().energy = clamp(activeChar().energy + 6 + Math.floor(finalDamage * 0.04), 0, 100);

      if (reactionResult) spawnDamageText(x, y - 22, reactionResult.name, "#ffd56b", 1.0);
    }

    function dealDamageToPlayer(target, amount, x = target.x + target.w / 2, y = target.y) {

      target.hitFlash = 8;

    function performNormalAttack(ch) {
      if (ch.attackTimer > 0 || ch.dodgeTimer > 0) return;

      ch.attackIndex = (ch.attackIndex % 3) + 1;
      ch.attackTimer = 20;

      let damage = ch.attack;
      let hbW = 62;
      let hbH = 28;

      if (ch.attackIndex === 2) {
        damage *= 1.15;
        hbW = 72;

        damage *= 1.35;
        hbW = 82;
        hbH = 34;

      const x = ch.facing === 1 ? ch.x + ch.w - 2 : ch.x - hbW + 2;
      const y = ch.y + offsetY;

      createHitbox("player", x, y, hbW, hbH, Math.round(damage), 8, null, 6, "#ffffff");
      spawnParticle(ch.x + ch.w / 2 + ch.facing * 28, ch.y + 28, "#f4f7ff", 8, 1.5, 2.5);
      ch.vx += ch.facing * 0.6;
      ch.energy = clamp(ch.energy + 4, 0, 100);

    function dodge(ch) {
      if (ch.stamina < 22 || ch.dodgeTimer > 0) return;
      ch.stamina -= 22;
      ch.dodgeTimer = 18;

    function switchCharacterTo(index) {
      if (index === null || index === undefined) return;
      if (index === "next") index = (activeIndex + 1) % party.length;
      if (!party[index] || party[index].hp <= 0 || index === activeIndex) return;

      const before = activeChar();
      activeIndex = index;
      const after = activeChar();

      after.x = before.x;
      after.y = before.y;
      after.vx = before.vx * 0.3;
      after.vy = before.vy;
      after.facing = before.facing;
      after.switchInvuln = 18;

      spawnParticle(after.x + after.w / 2, after.y + 30, after.color, 24, 1.8, 4.0);
      addLog(`キャラ切替：${after.name}`);
    }

    // =========================================================
    // Reset
    // =========================================================
    function resetGame() {
      party = partyTemplates.map((t, i) => createPartyMember(t, i));
      activeIndex = 0;
      enemy = createEnemy();
      particles = [];
      damageTexts = [];
      hitboxes = [];
      projectiles = [];
      fields = [];
      hideMessage();
      addLog("戦闘開始");
      renderPartySwitchBar();
    }
    resetGame();

    // =========================================================
    // Update
    // =========================================================
    function updatePlayer(ch) {
      if (ch.hp <= 0) return;

      const moveSpeed = ch.speed;

      if (input.moveX < -0.12) {
        ch.vx -= 0.8 * Math.abs(input.moveX);
        ch.facing = -1;
      }
      if (input.moveX > 0.12) {
        ch.vx += 0.8 * Math.abs(input.moveX);
        ch.facing = 1;
      }

      if (consumeInput("jumpQueued")) {
        if (ch.onGround) {
          ch.vy = -12.6;
          ch.onGround = false;
          spawnParticle(ch.x + ch.w / 2, ch.y + ch.h, "#dbe4ff", 10, 1.2, 2.0);
        }
      }

      if (consumeInput("attackQueued")) performNormalAttack(ch);
      if (consumeInput("chargedAttackQueued")) performChargedAttack(ch);
      if (consumeInput("skillQueued")) castSkill(ch);
      if (consumeInput("burstQueued")) castBurst(ch);
      if (consumeInput("dodgeQueued")) dodge(ch);

      if (input.switchTo !== null) {
        switchCharacterTo(input.switchTo);
        input.switchTo = null;
      }

      if (consumeInput("restartQueued")) resetGame();

      if (ch.attackTimer > 0) ch.attackTimer--;
      if (ch.skillCd > 0) ch.skillCd--;
      if (ch.invuln > 0) ch.invuln--;
      if (ch.hitFlash > 0) ch.hitFlash--;
      if (ch.dodgeTimer > 0) ch.dodgeTimer--;
      if (ch.switchInvuln > 0) ch.switchInvuln--;

      if (ch.dodgeTimer <= 0) {
        ch.vx = clamp(ch.vx, -moveSpeed, moveSpeed);
      } else {
        ch.vx *= 0.96;
      }

      ch.vy += GRAVITY;
      ch.x += ch.vx;
      ch.y += ch.vy;

      ch.vx *= FRICTION;

      if (ch.y + ch.h >= groundY()) {
        ch.y = groundY() - ch.h;
        ch.vy = 0;
        ch.onGround = true;
      } else {
        ch.onGround = false;
      }

      ch.x = clamp(ch.x, 20, W() - 20 - ch.w);
      ch.stamina += ch.dodgeTimer > 0 ? 0.12 : 0.32;
      ch.stamina = clamp(ch.stamina, 0, 100);
    }

    function updateEnemy() {
      if (enemy.hp <= 0) return;
      const ch = activeChar();
      if (!ch || ch.hp <= 0) return;

      if (enemy.hurtFlash > 0) enemy.hurtFlash--;
      if (enemy.attackCooldown > 0) enemy.attackCooldown--;
      if (enemy.attackWindup > 0) enemy.attackWindup--;
      if (enemy.summonCd > 0) enemy.summonCd--;
      if (enemy.dashCd > 0) enemy.dashCd--;
      if (enemy.projectileCd > 0) enemy.projectileCd--;
      if (enemy.auraTimer > 0) enemy.auraTimer--;
      if (enemy.defShredTimer > 0) enemy.defShredTimer--;

      if (enemy.auraTimer <= 0) enemy.elementAura = null;

      const dx = (ch.x + ch.w / 2) - (enemy.x + enemy.w / 2);
      enemy.facing = dx >= 0 ? 1 : -1;
      const adx = Math.abs(dx);

      if (enemy.attackWindup > 0) {
        if (enemy.attackWindup === 1) {
          const hbW = 78;
          const hbH = 58;
          const x = enemy.facing === 1 ? enemy.x + enemy.w - 8 : enemy.x - hbW + 8;
          const y = enemy.y + 38;
          createHitbox("enemy", x, y, hbW, hbH, 18, 8, null, 0, "#ff7d7d");
          spawnParticle(x + hbW / 2, y + hbH / 2, "#ff7777", 18, 1.8, 3.8);
          enemy.attackCooldown = 48;
        }
      } else {
        if (adx > 90) enemy.vx += enemy.facing * 0.22;

        if (adx < 88 && enemy.attackCooldown <= 0) enemy.attackWindup = 18;

        if (adx > 180 && enemy.projectileCd <= 0) {
          enemy.projectileCd = 150;
          projectiles.push({
            owner: "enemy",
            x: enemy.x + enemy.w / 2,
            y: enemy.y + 35,
            vx: enemy.facing * 5.4,
            vy: -0.2,
            r: 10,
            damage: 15,
            life: 120,
            element: null,
            color: "#ff6a6a",
            trail: true
          });
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 32, "#ff8181", 16, 1.4, 3.1);
        }

        if (adx > 130 && enemy.dashCd <= 0 && Math.random() < 0.008) {
          enemy.dashCd = 220;
          enemy.vx = enemy.facing * 9.5;
          const hbW = 92, hbH = 80;
          const x = enemy.facing === 1 ? enemy.x + enemy.w - 12 : enemy.x - hbW + 12;
          const y = enemy.y + 24;
          createHitbox("enemy", x, y, hbW, hbH, 24, 10, null, 0, "#ff9a6f");
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 52, "#ff8f68", 30, 1.7, 4.4);
        }

        if (enemy.summonCd <= 0) {
          enemy.summonCd = 420;
          const auraArr = ["pyro", "hydro", "electro", "cryo"];
          const picked = auraArr[Math.floor(Math.random() * auraArr.length)];
          enemy.elementAura = picked;
          enemy.auraTimer = 260;
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 18, elementColor(picked), 28, 1.9, 4.0);
          spawnDamageText(enemy.x + enemy.w / 2, enemy.y - 4, `${elementName(picked)}付着`, elementColor(picked), 0.9);
        }
      }

      enemy.vy += GRAVITY;
      enemy.x += enemy.vx;
      enemy.y += enemy.vy;
      enemy.vx *= 0.9;

      enemy.x = clamp(enemy.x, 40, W() - 40 - enemy.w);
      if (enemy.y + enemy.h >= groundY()) {
        enemy.y = groundY() - enemy.h;
        enemy.vy = 0;
      }
    }

    function updateHitboxes() {
      for (let i = hitboxes.length - 1; i >= 0; i--) {
        const hb = hitboxes[i];
        hb.duration--;

        if (hb.owner === "player" && enemy.hp > 0) {
          const enemyRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
          if (rectsHit(hb, enemyRect) && !hb.hitSet.has("enemy")) {
            hb.hitSet.add("enemy");
            dealDamageToEnemy(hb.damage, hb.element, enemy.x + enemy.w / 2, enemy.y + 34);
          }
        }

        if (hb.owner === "enemy") {
          const ch = activeChar();
          if (ch.hp > 0) {
            const chRect = { x: ch.x, y: ch.y, w: ch.w, h: ch.h };
            if (rectsHit(hb, chRect) && !hb.hitSet.has("player")) {
              hb.hitSet.add("player");
              dealDamageToPlayer(ch, hb.damage, ch.x + ch.w / 2, ch.y + 8);
            }
          }
        }

        if (hb.duration <= 0) hitboxes.splice(i, 1);
      }
    }

    function updateProjectiles() {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.life--;
        p.x += p.vx;
        p.y += p.vy;

        if (p.trail && Math.random() < 0.9) {
          particles.push({
            x: p.x, y: p.y,
            vx: rand(-0.5, 0.5),
            vy: rand(-0.5, 0.5),
            life: rand(10, 20),
            maxLife: 20,
            size: rand(2, 4),
            color: p.color
          });
        }

        let remove = false;

        if (p.owner === "player" && enemy.hp > 0) {
          const hitEnemy = (
            p.x + p.r > enemy.x &&
            p.x - p.r < enemy.x + enemy.w &&
            p.y + p.r > enemy.y &&
            p.y - p.r < enemy.y + enemy.h
          );
          if (hitEnemy) {
            dealDamageToEnemy(p.damage, p.element, p.x, p.y);
            spawnParticle(p.x, p.y, p.color, 16, 1.7, 3.5);
            remove = true;
          }
        }

        if (p.owner === "enemy") {
          const ch = activeChar();
          if (ch.hp > 0) {
            const hitPlayer = (
              p.x + p.r > ch.x &&
              p.x - p.r < ch.x + ch.w &&
              p.y + p.r > ch.y &&
              p.y - p.r < ch.y + ch.h
            );
            if (hitPlayer) {
              dealDamageToPlayer(ch, p.damage, p.x, p.y);
              spawnParticle(p.x, p.y, "#ff8e8e", 14, 1.5, 3.0);
              remove = true;
            }
          }
        }

        if (
          p.life <= 0 ||
          p.x < -100 || p.x > W() + 100 ||
          p.y < -100 || p.y > H() + 100
        ) remove = true;

        if (remove) projectiles.splice(i, 1);
      }
    }

    function updateFields() {
      for (let i = fields.length - 1; i >= 0; i--) {
        const f = fields[i];
        f.life--;
        f.tick++;

        if (enemy.hp > 0) {
          const enemyRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
          if (rectsHit(f, enemyRect)) {
            if (f.tick % 18 === 0) dealDamageToEnemy(f.damage, f.element, enemy.x + enemy.w / 2, enemy.y + 18);
            if (f.type === "freezeStorm" && f.tick % 22 === 0) enemy.vx *= 0.55;
          }
        }

        if (Math.random() < 0.65) {
          particles.push({
            x: rand(f.x, f.x + f.w),
            y: rand(f.y, f.y + f.h),
            vx: rand(-0.8, 0.8),
            vy: rand(-0.8, 0.8),
            life: rand(12, 24),
            maxLife: 24,
            size: rand(2, 5),
            color: elementColor(f.element)
          });
        }

        if (f.life <= 0) fields.splice(i, 1);
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateDamageTexts() {
      for (let i = damageTexts.length - 1; i >= 0; i--) {
        const d = damageTexts[i];
        d.life--;
        d.y += d.vy;
        if (d.life <= 0) damageTexts.splice(i, 1);
      }
    }

    function updatePartySync() {
      const ch = activeChar();
      for (let i = 0; i < party.length; i++) {
        if (i === activeIndex) continue;
        party[i].x = ch.x;
        party[i].y = ch.y;
        party[i].facing = ch.facing;
      }
    }

    function checkGameState() {
      const alive = party.some(c => c.hp > 0);
      if (!alive && !bigMessage.classList.contains("show")) {
        showMessage("DEFEAT", "パーティが全滅した。元素反応と回避のタイミングを合わせよう。");
      }

      if (enemy.hp <= 0 && !bigMessage.classList.contains("show")) {
        showMessage("VICTORY", "撃破！ スマホ戦闘UIの土台としてかなり強くなった。");
      }
    }

    function updateChargeVisual() {
      if (!attackPressing) {
        btnAttackCharge.style.setProperty("--charge", "0%");
        return;
      }
      const held = performance.now() - attackPressStart;
      const ratio = clamp(held / CHARGE_THRESHOLD, 0, 1);
      btnAttackCharge.style.setProperty("--charge", `${ratio * 100}%`);
    }

    function updateBurstReadyVisual() {
      const ch = activeChar();
      if (ch.energy >= ch.burstCost) {
        btnBurst.classList.add("ready");
      } else {
        btnBurst.classList.remove("ready");
      }
    }

    // =========================================================
    // Draw
    // =========================================================
    function drawBackground() {
      const h = H();
      const w = W();

      const grd = ctx.createLinearGradient(0, 0, 0, h);
      grd.addColorStop(0, "#1c2750");
      grd.addColorStop(0.45, "#101a37");
      grd.addColorStop(1, "#0a1020");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);

      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.02 + i * 0.008})`;
        ctx.beginPath();
        const baseY = h - 260 + i * 18;
        ctx.moveTo(0, h);
        for (let x = 0; x <= w; x += 80) {
          ctx.lineTo(x, baseY + Math.sin((x * 0.01) + i) * (20 + i * 8));
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();
      }

      const g = groundY();
      const groundGrd = ctx.createLinearGradient(0, g, 0, h);
      groundGrd.addColorStop(0, "#20274c");
      groundGrd.addColorStop(1, "#11162c");
      ctx.fillStyle = groundGrd;
      ctx.fillRect(0, g, w, h - g);

      ctx.strokeStyle = "rgba(190,220,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, g);
      ctx.lineTo(w, g);
      ctx.stroke();

      for (let i = 0; i < 4; i++) {
        const cx = 150 + i * 260;
        const cy = g + 38;
        ctx.strokeStyle = "rgba(130,170,255,0.06)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 30 + (i % 2) * 8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawCharacter(ch, isActive) {
      if (ch.hp <= 0) return;
      ctx.save();

      if (ch.invuln > 0 || ch.switchInvuln > 0) {
        ctx.globalAlpha = 0.75 + Math.sin(Date.now() * 0.03) * 0.15;
      }

      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(ch.x + ch.w / 2, groundY() + 5, 20, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      if (isActive) {
        ctx.strokeStyle = ch.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ch.x + ch.w / 2, ch.y + ch.h / 2, 34 + Math.sin(Date.now() * 0.01) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.translate(ch.x + ch.w / 2, ch.y + ch.h / 2);
      ctx.scale(ch.facing, 1);

      ctx.fillStyle = ch.hitFlash > 0 ? "#fff4f4" : ch.color;
      ctx.fillRect(-12, -10, 24, 34);

      ctx.beginPath();
      ctx.arc(0, -24, 14, 0, Math.PI * 2);
      ctx.fillStyle = ch.hitFlash > 0 ? "#fff7f7" : ch.secondary;
      ctx.fill();

      ctx.strokeStyle = ch.hitFlash > 0 ? "#fff5f5" : ch.secondary;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-10, -4);
      ctx.lineTo(-20, 10);
      ctx.moveTo(10, -4);
      ctx.lineTo(20, 10);
      ctx.stroke();

      ctx.strokeStyle = ch.color;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(-6, 24);
      ctx.lineTo(-10, 42);
      ctx.moveTo(6, 24);
      ctx.lineTo(10, 42);
      ctx.stroke();

      if (ch.attackTimer > 12) {
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(20, 0, 24, -1.4, 0.8);
        ctx.stroke();
      }

      if (ch.dodgeTimer > 0) {
        ctx.strokeStyle = "rgba(255,224,120,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 28, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();

      if (isActive) {
        ctx.fillStyle = "#f4f7ff";
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(ch.name, ch.x + ch.w / 2, ch.y - 12);
      }
    }

    function drawEnemy() {
      if (enemy.hp <= 0) return;
      ctx.save();

      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.beginPath();
      ctx.ellipse(enemy.x + enemy.w / 2, groundY() + 8, 34, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      if (enemy.elementAura) {
        ctx.strokeStyle = elementColor(enemy.elementAura);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(enemy.x + enemy.w / 2, enemy.y + 40, 50 + Math.sin(Date.now() * 0.009) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.translate(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2);
      ctx.scale(enemy.facing, 1);

      ctx.fillStyle = enemy.hurtFlash > 0 ? "#fff2f2" : "#7c2038";
      ctx.fillRect(-26, -24, 52, 70);

      ctx.fillStyle = enemy.hurtFlash > 0 ? "#ffeaea" : "#d85f7f";
      ctx.beginPath();
      ctx.arc(0, -44, 21, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#ffd4d4";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-10, -58); ctx.lineTo(-22, -76);
      ctx.moveTo(10, -58); ctx.lineTo(22, -76);
      ctx.stroke();

      ctx.strokeStyle = "#b44763";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(-20, -8); ctx.lineTo(-42, 22);
      ctx.moveTo(20, -8); ctx.lineTo(42, 22);
      ctx.stroke();

      ctx.strokeStyle = "#62152b";
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(-12, 44); ctx.lineTo(-18, 72);
      ctx.moveTo(12, 44); ctx.lineTo(18, 72);
      ctx.stroke();

      ctx.restore();

      ctx.fillStyle = "#ffe6e6";
      ctx.font = "bold 15px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("深淵の模造王", enemy.x + enemy.w / 2, enemy.y - 12);
    }

    function drawHitboxes() {
      for (const hb of hitboxes) {
        ctx.save();
        ctx.globalAlpha = 0.10;
        ctx.fillStyle = hb.color;
        ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
        ctx.restore();
      }
    }

    function drawProjectiles() {
      for (const p of projectiles) {
        ctx.save();
        const grd = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, p.r);
        grd.addColorStop(0, "#ffffff");
        grd.addColorStop(1, p.color);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFields() {
      for (const f of fields) {
        ctx.save();
        ctx.fillStyle = f.color;
        ctx.fillRect(f.x, f.y, f.w, f.h);
        ctx.strokeStyle = elementColor(f.element);
        ctx.lineWidth = 2;
        ctx.strokeRect(f.x, f.y, f.w, f.h);
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawDamageTexts() {
      for (const d of damageTexts) {
        const alpha = d.life / d.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = d.color;
        ctx.font = `bold ${Math.floor(16 * d.scale + 10)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(d.text, d.x, d.y);
        ctx.restore();
      }
    }

    // =========================================================
    // UI updates
    // =========================================================
    function renderPartySwitchBar() {
      partySwitchBar.innerHTML = "";
      party.forEach((c, i) => {
        const btn = document.createElement("button");
        btn.className = "partyIcon" + (i === activeIndex ? " active" : "") + (c.hp <= 0 ? " dead" : "");
        btn.style.backgroundColor = c.color + "33";
        btn.setAttribute("aria-label", `${c.name}に切替`);
        btn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          input.switchTo = i;
        });

        const hpPercent = clamp((c.hp / c.maxHp) * 100, 0, 100);
        btn.innerHTML = `
          <div class="partyHpRing" style="--hpdeg:${hpPercent}%"></div>
          <div class="partyFace">
            <div class="faceHead"></div>
            <div class="faceBody" style="background:${c.color};"></div>
          </div>
          <div class="partyShortName">${c.short}</div>
        `;
        partySwitchBar.appendChild(btn);
      });
    }

    function updateHUD() {
      const ch = activeChar();

      playerHpFill.style.width = ((ch.hp / ch.maxHp) * 100) + "%";
      playerHpText.textContent = `${Math.ceil(ch.hp)} / ${ch.maxHp}`;

      playerEnergyFill.style.width = ch.energy + "%";
      playerEnergyText.textContent = `${Math.floor(ch.energy)} / 100`;

      playerStaminaFill.style.width = ch.stamina + "%";
      playerStaminaText.textContent = `${Math.floor(ch.stamina)} / 100`;

      enemyHpFill.style.width = ((enemy.hp / enemy.maxHp) * 100) + "%";
      enemyHpText.textContent = `${Math.max(0, Math.ceil(enemy.hp))} / ${enemy.maxHp}`;

      renderPartySwitchBar();
      updateBurstReadyVisual();
      updateChargeVisual();
    }

    // =========================================================
    // Loop
    // =========================================================
    function loop() {
      ctx.clearRect(0, 0, W(), H());

      const ch = activeChar();

      if (!bigMessage.classList.contains("show")) {
        if (ch && ch.hp > 0 && enemy.hp > 0) {
          updatePlayer(ch);
          updateEnemy();
          updateHitboxes();
          updateProjectiles();
          updateFields();
          updateParticles();
          updateDamageTexts();
          updatePartySync();
          checkGameState();
        } else {
          updateParticles();
          updateDamageTexts();
          if (consumeInput("restartQueued")) resetGame();
          checkGameState();
        }
      } else {
        updateParticles();
        updateDamageTexts();
        if (consumeInput("restartQueued")) resetGame();
      }

      drawBackground();
      drawFields();
      drawHitboxes();
      drawProjectiles();
      drawEnemy();
      for (let i = 0; i < party.length; i++) {
        if (i === activeIndex) drawCharacter(party[i], true);
      }
      drawParticles();
      drawDamageTexts();

      updateHUD();
      requestAnimationFrame(loop);
    }

    loop();

    addLog("進化版UIで戦闘開始");
    addLog("左スティックで移動、上入力でジャンプ");
    addLog("攻撃長押しで重撃");
    addLog("爆発が光ったら撃ちどき");
  </script>
</body>
