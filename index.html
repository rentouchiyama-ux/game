<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elemental 2D Battle</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #0b1020;
      color: #eaf0ff;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      overflow: hidden;
    }

    #gameWrap {
      width: 100vw;
      height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(70,120,255,0.12), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255,180,80,0.10), transparent 25%),
        linear-gradient(180deg, #1a2340 0%, #101833 45%, #0a1022 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      left: 16px;
      top: 14px;
      z-index: 10;
      width: 420px;
      max-width: calc(100vw - 32px);
      background: rgba(7, 11, 24, 0.58);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.03em;
    }

    .barBox {
      margin-bottom: 10px;
    }

    .labelRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-size: 12px;
      color: #cfd8ff;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .fill {
      height: 100%;
      width: 50%;
      transition: width 0.12s linear;
      border-radius: 999px;
    }

    .hp { background: linear-gradient(90deg, #31d98a, #74f0b2); }
    .energy { background: linear-gradient(90deg, #5ca9ff, #9fd4ff); }
    .enemyHp { background: linear-gradient(90deg, #ff6a6a, #ff9c9c); }
    .stamina { background: linear-gradient(90deg, #ffcf4f, #ffe896); }

    #partyPanel {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .charCard {
      min-width: 120px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: default;
      transition: 0.2s;
    }

    .charCard.active {
      outline: 2px solid rgba(255,255,255,0.22);
      transform: translateY(-2px);
    }

    .charName {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .charMeta {
      font-size: 11px;
      color: #b8c4ec;
      line-height: 1.45;
    }

    #rightInfo {
      position: absolute;
      right: 16px;
      top: 14px;
      z-index: 10;
      width: 360px;
      max-width: calc(100vw - 32px);
      background: rgba(7, 11, 24, 0.58);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    #reactionLog {
      margin-top: 8px;
      max-height: 150px;
      overflow: auto;
      padding-right: 4px;
    }

    .logItem {
      font-size: 12px;
      color: #dbe4ff;
      padding: 4px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.08);
    }

    .hint {
      font-size: 12px;
      color: #b7c6ef;
      line-height: 1.6;
    }

    #bigMessage {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      z-index: 20;
      min-width: 320px;
      max-width: 80vw;
      text-align: center;
      background: rgba(5, 8, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 24px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      display: none;
    }

    #bigMessage.show { display: block; }

    #bigMessage h2 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #bigMessage p {
      margin: 6px 0;
      color: #d2dcff;
      line-height: 1.7;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      border-radius: 999px;
      padding: 2px 7px;
      margin-left: 6px;
      color: white;
      vertical-align: middle;
    }

    .pyro { background: #ff7a3d; }
    .hydro { background: #4ca8ff; }
    .electro { background: #b07cff; }
    .cryo { background: #8de7ff; color: #1d2b3f; }

    #footerMini {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(5,8,20,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      color: #ced9ff;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="title">2D元素アクションバトル</div>

      <div class="barBox">
        <div class="labelRow">
          <span>操作キャラHP</span>
          <span id="playerHpText">0 / 0</span>
        </div>
        <div class="bar"><div id="playerHpFill" class="fill hp"></div></div>
      </div>

      <div class="barBox">
        <div class="labelRow">
          <span>元素エネルギー</span>
          <span id="playerEnergyText">0 / 100</span>
        </div>
        <div class="bar"><div id="playerEnergyFill" class="fill energy"></div></div>
      </div>

      <div class="barBox">
        <div class="labelRow">
          <span>スタミナ</span>
          <span id="playerStaminaText">0 / 100</span>
        </div>
        <div class="bar"><div id="playerStaminaFill" class="fill stamina"></div></div>
      </div>

      <div class="barBox">
        <div class="labelRow">
          <span>ボスHP</span>
          <span id="enemyHpText">0 / 0</span>
        </div>
        <div class="bar"><div id="enemyHpFill" class="fill enemyHp"></div></div>
      </div>

      <div id="partyPanel"></div>
    </div>

    <div id="rightInfo">
      <div class="title">操作と反応</div>
      <div class="hint">
        移動: A / D<br>
        ジャンプ: W<br>
        通常攻撃: J<br>
        元素スキル: K<br>
        元素爆発: L<br>
        回避: Shift<br>
        キャラ切替: Q<br>
        リスタート: R<br><br>

        反応例:<br>
        炎 + 水 = 蒸発<br>
        炎 + 氷 = 溶解<br>
        水 + 雷 = 感電<br>
        氷 + 雷 = 超電導
      </div>
      <div id="reactionLog"></div>
    </div>

    <div id="bigMessage">
      <h2 id="bigMessageTitle">CLEAR</h2>
      <p id="bigMessageBody"></p>
      <p>Rキーで再挑戦</p>
    </div>

    <div id="footerMini">元素を重ねて反応を起こすと気持ちいい。だいたいそこが華。</div>
  </div>

  <script>
    // =========================================================
    // 基本設定
    // =========================================================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    const groundY = () => H() - 120;

    const GRAVITY = 0.72;
    const FRICTION = 0.82;

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
    });
    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function dist(ax, ay, bx, by) {
      return Math.hypot(ax - bx, ay - by);
    }

    function rectsHit(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    // =========================================================
    // UI参照
    // =========================================================
    const playerHpFill = document.getElementById("playerHpFill");
    const playerHpText = document.getElementById("playerHpText");
    const playerEnergyFill = document.getElementById("playerEnergyFill");
    const playerEnergyText = document.getElementById("playerEnergyText");
    const playerStaminaFill = document.getElementById("playerStaminaFill");
    const playerStaminaText = document.getElementById("playerStaminaText");

    const enemyHpFill = document.getElementById("enemyHpFill");
    const enemyHpText = document.getElementById("enemyHpText");

    const partyPanel = document.getElementById("partyPanel");
    const reactionLog = document.getElementById("reactionLog");
    const bigMessage = document.getElementById("bigMessage");
    const bigMessageTitle = document.getElementById("bigMessageTitle");
    const bigMessageBody = document.getElementById("bigMessageBody");

    function addLog(text) {
      const div = document.createElement("div");
      div.className = "logItem";
      div.textContent = text;
      reactionLog.prepend(div);
      while (reactionLog.children.length > 10) {
        reactionLog.removeChild(reactionLog.lastChild);
      }
    }

    function showMessage(title, body) {
      bigMessageTitle.textContent = title;
      bigMessageBody.textContent = body;
      bigMessage.classList.add("show");
    }

    function hideMessage() {
      bigMessage.classList.remove("show");
    }

    // =========================================================
    // パーティ定義
    // =========================================================
    const partyTemplates = [
      {
        name: "ヒノ",
        element: "pyro",
        maxHp: 240,
        attack: 18,
        skillCdMax: 240,
        burstCost: 100,
        speed: 5.1,
        color: "#ff7a3d",
        secondary: "#ffc49d",
        skillName: "炎刃斬り",
        burstName: "焔陣解放"
      },
      {
        name: "ミナ",
        element: "hydro",
        maxHp: 250,
        attack: 16,
        skillCdMax: 220,
        burstCost: 100,
        speed: 4.9,
        color: "#4ca8ff",
        secondary: "#b8e2ff",
        skillName: "水輪弾",
        burstName: "潮流結界"
      },
      {
        name: "ライ",
        element: "electro",
        maxHp: 230,
        attack: 17,
        skillCdMax: 210,
        burstCost: 100,
        speed: 5.2,
        color: "#b07cff",
        secondary: "#ead9ff",
        skillName: "雷迅突",
        burstName: "紫電放域"
      },
      {
        name: "ユキ",
        element: "cryo",
        maxHp: 245,
        attack: 15,
        skillCdMax: 230,
        burstCost: 100,
        speed: 4.8,
        color: "#8de7ff",
        secondary: "#ecfbff",
        skillName: "氷結片",
        burstName: "霜華結晶"
      }
    ];

    function createPartyMember(template, index) {
      return {
        id: index,
        name: template.name,
        element: template.element,
        maxHp: template.maxHp,
        hp: template.maxHp,
        attack: template.attack,
        energy: 0,
        burstCost: template.burstCost,
        skillCd: 0,
        skillCdMax: template.skillCdMax,
        speed: template.speed,
        color: template.color,
        secondary: template.secondary,
        skillName: template.skillName,
        burstName: template.burstName,
        x: 180,
        y: groundY() - 78,
        w: 42,
        h: 78,
        vx: 0,
        vy: 0,
        facing: 1,
        onGround: false,
        attackTimer: 0,
        attackIndex: 0,
        invuln: 0,
        dodgeTimer: 0,
        stamina: 100,
        hitFlash: 0,
        switchInvuln: 0
      };
    }

    let party = [];
    let activeIndex = 0;

    function activeChar() {
      return party[activeIndex];
    }

    // =========================================================
    // 敵定義
    // =========================================================
    function createEnemy() {
      return {
        x: W() - 260,
        y: groundY() - 120,
        w: 86,
        h: 120,
        maxHp: 1800,
        hp: 1800,
        vx: 0,
        vy: 0,
        speed: 2.3,
        facing: -1,
        attackCooldown: 0,
        attackWindup: 0,
        hurtFlash: 0,
        aiState: "idle",
        summonCd: 420,
        dashCd: 260,
        projectileCd: 160,
        elementAura: null,
        auraTimer: 0
      };
    }

    let enemy = createEnemy();

    // =========================================================
    // エフェクト類
    // =========================================================
    let particles = [];
    let damageTexts = [];
    let hitboxes = [];
    let projectiles = [];
    let fields = [];

    function spawnParticle(x, y, color, count = 10, spread = 2.5, speed = 4) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const s = Math.random() * speed;
        particles.push({
          x, y,
          vx: Math.cos(angle) * s * spread,
          vy: Math.sin(angle) * s * spread,
          life: rand(18, 40),
          maxLife: rand(18, 40),
          size: rand(2, 6),
          color
        });
      }
    }

    function spawnDamageText(x, y, text, color = "#ffffff", scale = 1) {
      damageTexts.push({
        x, y, text, color,
        life: 50,
        maxLife: 50,
        vy: -1.1,
        scale
      });
    }

    function elementColor(el) {
      switch (el) {
        case "pyro": return "#ff7a3d";
        case "hydro": return "#4ca8ff";
        case "electro": return "#b07cff";
        case "cryo": return "#8de7ff";
        default: return "#ffffff";
      }
    }

    function elementName(el) {
      switch (el) {
        case "pyro": return "炎";
        case "hydro": return "水";
        case "electro": return "雷";
        case "cryo": return "氷";
        default: return "無";
      }
    }

    // =========================================================
    // 元素反応
    // =========================================================
    function getReaction(a, b) {
      const set = [a, b].sort().join("+");
      switch (set) {
        case "hydro+pyro":
          return { name: "蒸発", multiplier: 1.8, extra: "burst" };
        case "cryo+pyro":
          return { name: "溶解", multiplier: 2.0, extra: "burst" };
        case "electro+hydro":
          return { name: "感電", multiplier: 1.25, extra: "dot" };
        case "cryo+electro":
          return { name: "超電導", multiplier: 1.2, extra: "shred" };
        default:
          return null;
      }
    }

    function applyElementAura(target, element, duration = 180) {
      if (!element) return;
      if (!target.elementAura) {
        target.elementAura = element;
        target.auraTimer = duration;
        addLog(`${elementName(element)}元素付着`);
        return { reacted: false };
      }

      if (target.elementAura === element) {
        target.auraTimer = Math.max(target.auraTimer, duration);
        return { reacted: false };
      }

      const reaction = getReaction(target.elementAura, element);
      if (reaction) {
        const oldAura = target.elementAura;
        target.elementAura = null;
        target.auraTimer = 0;
        addLog(`${elementName(oldAura)} + ${elementName(element)} → ${reaction.name}`);
        return {
          reacted: true,
          reaction
        };
      }

      target.elementAura = element;
      target.auraTimer = duration;
      return { reacted: false };
    }

    function dealDamageToEnemy(amount, hitElement = null, x = enemy.x + enemy.w / 2, y = enemy.y + 20) {
      let finalDamage = amount;
      let reactionResult = null;

      if (hitElement) {
        const auraRes = applyElementAura(enemy, hitElement, 220);
        if (auraRes.reacted) {
          reactionResult = auraRes.reaction;
          finalDamage *= auraRes.reaction.multiplier;

          if (auraRes.reaction.extra === "dot") {
            for (let i = 0; i < 3; i++) {
              setTimeout(() => {
                if (enemy.hp > 0) {
                  enemy.hp = Math.max(0, enemy.hp - 9);
                  spawnDamageText(enemy.x + enemy.w / 2 + rand(-18, 18), enemy.y + 15 + rand(-12, 12), "9", "#9dd8ff", 0.9);
                  spawnParticle(enemy.x + enemy.w / 2, enemy.y + 40, "#73b8ff", 8, 1.2, 2.2);
                }
              }, 180 * (i + 1));
            }
          }

          if (auraRes.reaction.extra === "shred") {
            enemy.hurtFlash = 16;
            enemy.defShredTimer = 180;
          }
        }
      }

      if (enemy.defShredTimer > 0) {
        finalDamage *= 1.18;
      }

      finalDamage = Math.round(finalDamage);
      enemy.hp = Math.max(0, enemy.hp - finalDamage);
      enemy.hurtFlash = 8;

      spawnDamageText(x + rand(-16, 16), y + rand(-10, 10), String(finalDamage), reactionResult ? "#ffe27d" : "#ffffff", reactionResult ? 1.18 : 1);
      spawnParticle(x, y, hitElement ? elementColor(hitElement) : "#ffffff", reactionResult ? 18 : 10, 1.8, reactionResult ? 5.5 : 3.3);

      activeChar().energy = clamp(activeChar().energy + 6 + Math.floor(finalDamage * 0.04), 0, 100);

      if (reactionResult) {
        spawnDamageText(x, y - 22, reactionResult.name, "#ffd56b", 1.0);
      }
    }

    function dealDamageToPlayer(target, amount, x = target.x + target.w / 2, y = target.y) {
      if (target.invuln > 0 || target.dodgeTimer > 0 || target.switchInvuln > 0) return;

      target.hp = Math.max(0, target.hp - amount);
      target.hitFlash = 8;
      target.invuln = 28;
      spawnDamageText(x, y, String(amount), "#ff9f9f", 1.0);
      spawnParticle(x, y + 20, "#ff7b7b", 12, 1.8, 3.2);

      if (target.hp <= 0) {
        // パーティ全滅判定はメインループ側で見る
      }
    }

    // =========================================================
    // 攻撃/スキル/爆発
    // =========================================================
    function createHitbox(owner, x, y, w, h, damage, duration, element = null, knock = 0, color = null) {
      hitboxes.push({
        owner,
        x, y, w, h,
        damage,
        duration,
        maxDuration: duration,
        element,
        knock,
        hitSet: new Set(),
        color: color || (element ? elementColor(element) : "#ffffff")
      });
    }

    function performNormalAttack(ch) {
      if (ch.attackTimer > 0 || ch.dodgeTimer > 0) return;

      ch.attackIndex = (ch.attackIndex % 3) + 1;
      ch.attackTimer = 20;

      let reach = 56;
      let damage = ch.attack;
      let hbW = 62;
      let hbH = 28;
      let offsetY = 18;

      if (ch.attackIndex === 2) {
        damage *= 1.15;
        hbW = 72;
      } else if (ch.attackIndex === 3) {
        damage *= 1.35;
        hbW = 82;
        hbH = 34;
      }

      const x = ch.facing === 1 ? ch.x + ch.w - 2 : ch.x - hbW + 2;
      const y = ch.y + offsetY;

      createHitbox("player", x, y, hbW, hbH, Math.round(damage), 8, null, 6, "#ffffff");
      spawnParticle(ch.x + ch.w / 2 + ch.facing * reach * 0.5, ch.y + 28, "#f4f7ff", 8, 1.5, 2.5);

      ch.vx += ch.facing * 0.6;
      ch.energy = clamp(ch.energy + 4, 0, 100);
    }

    function castSkill(ch) {
      if (ch.skillCd > 0 || ch.dodgeTimer > 0) return;
      ch.skillCd = ch.skillCdMax;

      if (ch.element === "pyro") {
        const hbW = 96, hbH = 54;
        const x = ch.facing === 1 ? ch.x + ch.w : ch.x - hbW;
        const y = ch.y + 8;
        createHitbox("player", x, y, hbW, hbH, Math.round(ch.attack * 2.2), 16, "pyro", 10);
        spawnParticle(x + hbW / 2, y + hbH / 2, "#ff7a3d", 26, 1.8, 4.4);
        addLog(`${ch.name}：${ch.skillName}`);
      }

      if (ch.element === "hydro") {
        const speed = 8.5 * ch.facing;
        projectiles.push({
          owner: "player",
          x: ch.x + ch.w / 2,
          y: ch.y + 24,
          vx: speed,
          vy: 0,
          r: 12,
          damage: Math.round(ch.attack * 1.9),
          life: 90,
          element: "hydro",
          color: "#4ca8ff",
          trail: true
        });
        spawnParticle(ch.x + ch.w / 2, ch.y + 22, "#4ca8ff", 20, 1.3, 3.5);
        addLog(`${ch.name}：${ch.skillName}`);
      }

      if (ch.element === "electro") {
        ch.vx = 10 * ch.facing;
        const hbW = 84, hbH = 48;
        const x = ch.facing === 1 ? ch.x + ch.w : ch.x - hbW;
        const y = ch.y + 12;
        createHitbox("player", x, y, hbW, hbH, Math.round(ch.attack * 2.0), 10, "electro", 14);
        spawnParticle(x + hbW / 2, y + hbH / 2, "#b07cff", 28, 2.1, 4.7);
        addLog(`${ch.name}：${ch.skillName}`);
      }

      if (ch.element === "cryo") {
        for (let i = 0; i < 3; i++) {
          projectiles.push({
            owner: "player",
            x: ch.x + ch.w / 2,
            y: ch.y + 18 + i * 9,
            vx: (7.8 + i * 0.8) * ch.facing,
            vy: -0.8 + i * 0.35,
            r: 9,
            damage: Math.round(ch.attack * 1.15),
            life: 88,
            element: "cryo",
            color: "#8de7ff",
            trail: true
          });
        }
        spawnParticle(ch.x + ch.w / 2, ch.y + 25, "#8de7ff", 22, 1.8, 3.3);
        addLog(`${ch.name}：${ch.skillName}`);
      }

      ch.energy = clamp(ch.energy + 12, 0, 100);
    }

    function castBurst(ch) {
      if (ch.energy < ch.burstCost || ch.dodgeTimer > 0) return;

      ch.energy = 0;
      addLog(`${ch.name}：${ch.burstName}`);

      if (ch.element === "pyro") {
        fields.push({
          owner: "player",
          type: "burstField",
          x: enemy.x - 40,
          y: groundY() - 100,
          w: 180,
          h: 100,
          life: 180,
          tick: 0,
          damage: Math.round(ch.attack * 1.1),
          element: "pyro",
          color: "rgba(255,122,61,0.28)"
        });
        spawnParticle(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, "#ff7a3d", 70, 2.6, 5.2);
      }

      if (ch.element === "hydro") {
        fields.push({
          owner: "player",
          type: "burstField",
          x: enemy.x - 50,
          y: groundY() - 110,
          w: 200,
          h: 110,
          life: 170,
          tick: 0,
          damage: Math.round(ch.attack * 0.95),
          element: "hydro",
          color: "rgba(76,168,255,0.26)"
        });
        spawnParticle(enemy.x + enemy.w / 2, enemy.y + 30, "#4ca8ff", 70, 2.8, 5.0);
      }

      if (ch.element === "electro") {
        for (let i = 0; i < 7; i++) {
          setTimeout(() => {
            if (enemy.hp <= 0) return;
            const sx = enemy.x + rand(10, enemy.w - 10);
            const sy = enemy.y + rand(0, enemy.h * 0.3);
            createHitbox("player", enemy.x - 20, enemy.y - 10, enemy.w + 40, enemy.h + 20, Math.round(ch.attack * 1.0), 2, "electro", 0);
            spawnParticle(sx, sy, "#b07cff", 30, 2.0, 5.5);
            spawnDamageText(sx, sy - 18, "落雷", "#d8b8ff", 0.95);
          }, i * 110);
        }
      }

      if (ch.element === "cryo") {
        fields.push({
          owner: "player",
          type: "freezeStorm",
          x: enemy.x - 30,
          y: enemy.y - 20,
          w: 170,
          h: 150,
          life: 180,
          tick: 0,
          damage: Math.round(ch.attack * 0.9),
          element: "cryo",
          color: "rgba(141,231,255,0.24)"
        });
        spawnParticle(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2, "#8de7ff", 80, 2.4, 5.3);
      }
    }

    function dodge(ch) {
      if (ch.stamina < 22 || ch.dodgeTimer > 0) return;
      ch.stamina -= 22;
      ch.dodgeTimer = 18;
      ch.invuln = 20;
      ch.vx = ch.facing * 8.4;
      spawnParticle(ch.x + ch.w / 2, ch.y + 46, "#ffe08a", 18, 1.5, 2.6);
    }

    function switchCharacter() {
      if (party.length <= 1) return;

      const before = activeChar();
      let nextIndex = (activeIndex + 1) % party.length;

      for (let i = 0; i < party.length; i++) {
        const idx = (activeIndex + 1 + i) % party.length;
        if (party[idx].hp > 0) {
          nextIndex = idx;
          break;
        }
      }

      if (party[nextIndex].hp <= 0) return;

      activeIndex = nextIndex;
      const after = activeChar();
      after.x = before.x;
      after.y = before.y;
      after.vx = before.vx * 0.3;
      after.vy = before.vy;
      after.facing = before.facing;
      after.switchInvuln = 18;
      spawnParticle(after.x + after.w / 2, after.y + 30, after.color, 24, 1.8, 4.0);
      addLog(`キャラ切替：${after.name}`);
    }

    // =========================================================
    // 入力管理（押した瞬間）
    // =========================================================
    const justPressed = {};
    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (!keys["_prev_" + k]) {
        justPressed[k] = true;
      }
      keys["_prev_" + k] = true;
    });
    window.addEventListener("keyup", (e) => {
      const k = e.key.toLowerCase();
      keys["_prev_" + k] = false;
    });

    function consumePressed(k) {
      if (justPressed[k]) {
        justPressed[k] = false;
        return true;
      }
      return false;
    }

    // =========================================================
    // リセット
    // =========================================================
    function resetGame() {
      party = partyTemplates.map((t, i) => createPartyMember(t, i));
      activeIndex = 0;
      enemy = createEnemy();
      particles = [];
      damageTexts = [];
      hitboxes = [];
      projectiles = [];
      fields = [];
      hideMessage();
      addLog("戦闘開始");
    }
    resetGame();

    // =========================================================
    // 更新処理
    // =========================================================
    function updatePlayer(ch) {
      if (ch.hp <= 0) return;

      const moveSpeed = ch.speed;

      if (keys["a"]) {
        ch.vx -= 0.8;
        ch.facing = -1;
      }
      if (keys["d"]) {
        ch.vx += 0.8;
        ch.facing = 1;
      }

      if (consumePressed("w")) {
        if (ch.onGround) {
          ch.vy = -12.6;
          ch.onGround = false;
          spawnParticle(ch.x + ch.w / 2, ch.y + ch.h, "#dbe4ff", 10, 1.2, 2.0);
        }
      }

      if (consumePressed("j")) performNormalAttack(ch);
      if (consumePressed("k")) castSkill(ch);
      if (consumePressed("l")) castBurst(ch);
      if (consumePressed("q")) switchCharacter();
      if (consumePressed("r")) resetGame();

      if (consumePressed("shift")) dodge(ch);

      if (ch.attackTimer > 0) ch.attackTimer--;
      if (ch.skillCd > 0) ch.skillCd--;
      if (ch.invuln > 0) ch.invuln--;
      if (ch.hitFlash > 0) ch.hitFlash--;
      if (ch.dodgeTimer > 0) ch.dodgeTimer--;
      if (ch.switchInvuln > 0) ch.switchInvuln--;

      if (ch.dodgeTimer <= 0) {
        ch.vx = clamp(ch.vx, -moveSpeed, moveSpeed);
      } else {
        ch.vx *= 0.96;
      }

      ch.vy += GRAVITY;
      ch.x += ch.vx;
      ch.y += ch.vy;

      ch.vx *= FRICTION;

      if (ch.y + ch.h >= groundY()) {
        ch.y = groundY() - ch.h;
        ch.vy = 0;
        ch.onGround = true;
      } else {
        ch.onGround = false;
      }

      ch.x = clamp(ch.x, 20, W() - 20 - ch.w);

      ch.stamina += ch.dodgeTimer > 0 ? 0.12 : 0.32;
      ch.stamina = clamp(ch.stamina, 0, 100);
    }

    function updateEnemy() {
      if (enemy.hp <= 0) return;

      const ch = activeChar();
      if (!ch || ch.hp <= 0) return;

      if (enemy.hurtFlash > 0) enemy.hurtFlash--;
      if (enemy.attackCooldown > 0) enemy.attackCooldown--;
      if (enemy.attackWindup > 0) enemy.attackWindup--;
      if (enemy.summonCd > 0) enemy.summonCd--;
      if (enemy.dashCd > 0) enemy.dashCd--;
      if (enemy.projectileCd > 0) enemy.projectileCd--;
      if (enemy.auraTimer > 0) enemy.auraTimer--;
      if (enemy.defShredTimer > 0) enemy.defShredTimer--;

      if (enemy.auraTimer <= 0) {
        enemy.elementAura = null;
      }

      const dx = (ch.x + ch.w / 2) - (enemy.x + enemy.w / 2);
      enemy.facing = dx >= 0 ? 1 : -1;
      const adx = Math.abs(dx);

      if (enemy.attackWindup > 0) {
        if (enemy.attackWindup === 1) {
          const hbW = 78;
          const hbH = 58;
          const x = enemy.facing === 1 ? enemy.x + enemy.w - 8 : enemy.x - hbW + 8;
          const y = enemy.y + 38;
          createHitbox("enemy", x, y, hbW, hbH, 18, 8, null, 0, "#ff7d7d");
          spawnParticle(x + hbW / 2, y + hbH / 2, "#ff7777", 18, 1.8, 3.8);
          enemy.attackCooldown = 48;
        }
      } else {
        if (adx > 90) {
          enemy.vx += enemy.facing * 0.22;
        }

        if (adx < 88 && enemy.attackCooldown <= 0) {
          enemy.attackWindup = 18;
        }

        if (adx > 180 && enemy.projectileCd <= 0) {
          enemy.projectileCd = 150;
          projectiles.push({
            owner: "enemy",
            x: enemy.x + enemy.w / 2,
            y: enemy.y + 35,
            vx: enemy.facing * 5.4,
            vy: -0.2,
            r: 10,
            damage: 15,
            life: 120,
            element: null,
            color: "#ff6a6a",
            trail: true
          });
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 32, "#ff8181", 16, 1.4, 3.1);
        }

        if (adx > 130 && enemy.dashCd <= 0 && Math.random() < 0.008) {
          enemy.dashCd = 220;
          enemy.vx = enemy.facing * 9.5;
          const hbW = 92, hbH = 80;
          const x = enemy.facing === 1 ? enemy.x + enemy.w - 12 : enemy.x - hbW + 12;
          const y = enemy.y + 24;
          createHitbox("enemy", x, y, hbW, hbH, 24, 10, null, 0, "#ff9a6f");
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 52, "#ff8f68", 30, 1.7, 4.4);
        }

        if (enemy.summonCd <= 0) {
          enemy.summonCd = 420;
          const auraArr = ["pyro", "hydro", "electro", "cryo"];
          const picked = auraArr[Math.floor(Math.random() * auraArr.length)];
          enemy.elementAura = picked;
          enemy.auraTimer = 260;
          spawnParticle(enemy.x + enemy.w / 2, enemy.y + 18, elementColor(picked), 28, 1.9, 4.0);
          spawnDamageText(enemy.x + enemy.w / 2, enemy.y - 4, `${elementName(picked)}付着`, elementColor(picked), 0.9);
        }
      }

      enemy.vy += GRAVITY;
      enemy.x += enemy.vx;
      enemy.y += enemy.vy;
      enemy.vx *= 0.9;

      enemy.x = clamp(enemy.x, 40, W() - 40 - enemy.w);

      if (enemy.y + enemy.h >= groundY()) {
        enemy.y = groundY() - enemy.h;
        enemy.vy = 0;
      }
    }

    function updateHitboxes() {
      for (let i = hitboxes.length - 1; i >= 0; i--) {
        const hb = hitboxes[i];
        hb.duration--;

        if (hb.owner === "player" && enemy.hp > 0) {
          const enemyRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
          if (rectsHit(hb, enemyRect) && !hb.hitSet.has("enemy")) {
            hb.hitSet.add("enemy");
            dealDamageToEnemy(hb.damage, hb.element, enemy.x + enemy.w / 2, enemy.y + 34);
          }
        }

        if (hb.owner === "enemy") {
          const ch = activeChar();
          if (ch.hp > 0) {
            const chRect = { x: ch.x, y: ch.y, w: ch.w, h: ch.h };
            if (rectsHit(hb, chRect) && !hb.hitSet.has("player")) {
              hb.hitSet.add("player");
              dealDamageToPlayer(ch, hb.damage, ch.x + ch.w / 2, ch.y + 8);
            }
          }
        }

        if (hb.duration <= 0) {
          hitboxes.splice(i, 1);
        }
      }
    }

    function updateProjectiles() {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.life--;
        p.x += p.vx;
        p.y += p.vy;

        if (p.trail && Math.random() < 0.9) {
          particles.push({
            x: p.x, y: p.y,
            vx: rand(-0.5, 0.5),
            vy: rand(-0.5, 0.5),
            life: rand(10, 20),
            maxLife: 20,
            size: rand(2, 4),
            color: p.color
          });
        }

        let remove = false;

        if (p.owner === "player" && enemy.hp > 0) {
          const hitEnemy = (
            p.x + p.r > enemy.x &&
            p.x - p.r < enemy.x + enemy.w &&
            p.y + p.r > enemy.y &&
            p.y - p.r < enemy.y + enemy.h
          );
          if (hitEnemy) {
            dealDamageToEnemy(p.damage, p.element, p.x, p.y);
            spawnParticle(p.x, p.y, p.color, 16, 1.7, 3.5);
            remove = true;
          }
        }

        if (p.owner === "enemy") {
          const ch = activeChar();
          if (ch.hp > 0) {
            const hitPlayer = (
              p.x + p.r > ch.x &&
              p.x - p.r < ch.x + ch.w &&
              p.y + p.r > ch.y &&
              p.y - p.r < ch.y + ch.h
            );
            if (hitPlayer) {
              dealDamageToPlayer(ch, p.damage, p.x, p.y);
              spawnParticle(p.x, p.y, "#ff8e8e", 14, 1.5, 3.0);
              remove = true;
            }
          }
        }

        if (
          p.life <= 0 ||
          p.x < -100 || p.x > W() + 100 ||
          p.y < -100 || p.y > H() + 100
        ) {
          remove = true;
        }

        if (remove) projectiles.splice(i, 1);
      }
    }

    function updateFields() {
      for (let i = fields.length - 1; i >= 0; i--) {
        const f = fields[i];
        f.life--;
        f.tick++;

        if (enemy.hp > 0) {
          const enemyRect = { x: enemy.x, y: enemy.y, w: enemy.w, h: enemy.h };
          if (rectsHit(f, enemyRect)) {
            if (f.tick % 18 === 0) {
              dealDamageToEnemy(f.damage, f.element, enemy.x + enemy.w / 2, enemy.y + 18);
            }

            if (f.type === "freezeStorm" && f.tick % 22 === 0) {
              enemy.vx *= 0.55;
            }
          }
        }

        if (Math.random() < 0.65) {
          particles.push({
            x: rand(f.x, f.x + f.w),
            y: rand(f.y, f.y + f.h),
            vx: rand(-0.8, 0.8),
            vy: rand(-0.8, 0.8),
            life: rand(12, 24),
            maxLife: 24,
            size: rand(2, 5),
            color: elementColor(f.element)
          });
        }

        if (f.life <= 0) fields.splice(i, 1);
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateDamageTexts() {
      for (let i = damageTexts.length - 1; i >= 0; i--) {
        const d = damageTexts[i];
        d.life--;
        d.y += d.vy;
        if (d.life <= 0) damageTexts.splice(i, 1);
      }
    }

    function updatePartySync() {
      const ch = activeChar();
      for (let i = 0; i < party.length; i++) {
        if (i === activeIndex) continue;
        party[i].x = ch.x;
        party[i].y = ch.y;
        party[i].facing = ch.facing;
      }
    }

    function checkGameState() {
      const alive = party.some(c => c.hp > 0);
      if (!alive) {
        showMessage("DEFEAT", "パーティが全滅した。元素反応の順番を工夫して押し切ろう。");
      }

      if (enemy.hp <= 0) {
        showMessage("VICTORY", "ボス撃破！ スキル→別元素→爆発の流れがかなり強い。");
      }
    }

    // =========================================================
    // 描画処理
    // =========================================================
    function drawBackground() {
      const h = H();
      const w = W();

      const grd = ctx.createLinearGradient(0, 0, 0, h);
      grd.addColorStop(0, "#1c2750");
      grd.addColorStop(0.45, "#101a37");
      grd.addColorStop(1, "#0a1020");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);

      // 遠景
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = `rgba(255,255,255,${0.02 + i * 0.008})`;
        ctx.beginPath();
        const baseY = h - 260 + i * 18;
        ctx.moveTo(0, h);
        for (let x = 0; x <= w; x += 80) {
          ctx.lineTo(x, baseY + Math.sin((x * 0.01) + i) * (20 + i * 8));
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();
      }

      // 地面
      const g = groundY();
      const groundGrd = ctx.createLinearGradient(0, g, 0, h);
      groundGrd.addColorStop(0, "#20274c");
      groundGrd.addColorStop(1, "#11162c");
      ctx.fillStyle = groundGrd;
      ctx.fillRect(0, g, w, h - g);

      // 地面ライン
      ctx.strokeStyle = "rgba(190,220,255,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, g);
      ctx.lineTo(w, g);
      ctx.stroke();

      // 薄いルーン
      for (let i = 0; i < 4; i++) {
        const cx = 150 + i * 260;
        const cy = g + 38;
        ctx.strokeStyle = "rgba(130,170,255,0.06)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 30 + (i % 2) * 8, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawCharacter(ch, isActive) {
      if (ch.hp <= 0) return;

      ctx.save();

      if (ch.invuln > 0 || ch.switchInvuln > 0) {
        ctx.globalAlpha = 0.75 + Math.sin(Date.now() * 0.03) * 0.15;
      }

      // 影
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(ch.x + ch.w / 2, groundY() + 5, 20, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // 元素オーラ
      if (isActive) {
        ctx.strokeStyle = ch.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ch.x + ch.w / 2, ch.y + ch.h / 2, 34 + Math.sin(Date.now() * 0.01) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }

      // 本体
      ctx.translate(ch.x + ch.w / 2, ch.y + ch.h / 2);
      ctx.scale(ch.facing, 1);

      if (ch.hitFlash > 0) {
        ctx.fillStyle = "#fff4f4";
      } else {
        ctx.fillStyle = ch.color;
      }

      // 胴体
      ctx.fillRect(-12, -10, 24, 34);

      // 頭
      ctx.beginPath();
      ctx.arc(0, -24, 14, 0, Math.PI * 2);
      ctx.fillStyle = ch.hitFlash > 0 ? "#fff7f7" : ch.secondary;
      ctx.fill();

      // 腕
      ctx.strokeStyle = ch.hitFlash > 0 ? "#fff5f5" : ch.secondary;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-10, -4);
      ctx.lineTo(-20, 10);
      ctx.moveTo(10, -4);
      ctx.lineTo(20, 10);
      ctx.stroke();

      // 足
      ctx.strokeStyle = ch.color;
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(-6, 24);
      ctx.lineTo(-10, 42);
      ctx.moveTo(6, 24);
      ctx.lineTo(10, 42);
      ctx.stroke();

      // 武器っぽいエフェクト
      if (ch.attackTimer > 12) {
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(20, 0, 24, -1.4, 0.8);
        ctx.stroke();
      }

      if (ch.dodgeTimer > 0) {
        ctx.strokeStyle = "rgba(255,224,120,0.7)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 28, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.restore();

      // 名前
      if (isActive) {
        ctx.fillStyle = "#f4f7ff";
        ctx.font = "bold 14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(ch.name, ch.x + ch.w / 2, ch.y - 12);
      }
    }

    function drawEnemy() {
      if (enemy.hp <= 0) return;

      ctx.save();

      // 影
      ctx.fillStyle = "rgba(0,0,0,0.28)";
      ctx.beginPath();
      ctx.ellipse(enemy.x + enemy.w / 2, groundY() + 8, 34, 12, 0, 0, Math.PI * 2);
      ctx.fill();

      // オーラ
      if (enemy.elementAura) {
        ctx.strokeStyle = elementColor(enemy.elementAura);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(enemy.x + enemy.w / 2, enemy.y + 40, 50 + Math.sin(Date.now() * 0.009) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      // 本体
      ctx.translate(enemy.x + enemy.w / 2, enemy.y + enemy.h / 2);
      ctx.scale(enemy.facing, 1);

      ctx.fillStyle = enemy.hurtFlash > 0 ? "#fff2f2" : "#7c2038";
      ctx.fillRect(-26, -24, 52, 70);

      ctx.fillStyle = enemy.hurtFlash > 0 ? "#ffeaea" : "#d85f7f";
      ctx.beginPath();
      ctx.arc(0, -44, 21, 0, Math.PI * 2);
      ctx.fill();

      // 角
      ctx.strokeStyle = "#ffd4d4";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(-10, -58); ctx.lineTo(-22, -76);
      ctx.moveTo(10, -58); ctx.lineTo(22, -76);
      ctx.stroke();

      // 腕
      ctx.strokeStyle = "#b44763";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(-20, -8); ctx.lineTo(-42, 22);
      ctx.moveTo(20, -8); ctx.lineTo(42, 22);
      ctx.stroke();

      // 足
      ctx.strokeStyle = "#62152b";
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(-12, 44); ctx.lineTo(-18, 72);
      ctx.moveTo(12, 44); ctx.lineTo(18, 72);
      ctx.stroke();

      ctx.restore();

      ctx.fillStyle = "#ffe6e6";
      ctx.font = "bold 15px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("深淵の模造王", enemy.x + enemy.w / 2, enemy.y - 12);
    }

    function drawHitboxes() {
      for (const hb of hitboxes) {
        ctx.save();
        ctx.globalAlpha = 0.10;
        ctx.fillStyle = hb.color;
        ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
        ctx.restore();
      }
    }

    function drawProjectiles() {
      for (const p of projectiles) {
        ctx.save();
        const grd = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, p.r);
        grd.addColorStop(0, "#ffffff");
        grd.addColorStop(1, p.color);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawFields() {
      for (const f of fields) {
        ctx.save();
        ctx.fillStyle = f.color;
        ctx.fillRect(f.x, f.y, f.w, f.h);
        ctx.strokeStyle = elementColor(f.element);
        ctx.lineWidth = 2;
        ctx.strokeRect(f.x, f.y, f.w, f.h);
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawDamageTexts() {
      for (const d of damageTexts) {
        const alpha = d.life / d.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = d.color;
        ctx.font = `bold ${Math.floor(16 * d.scale + 10)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(d.text, d.x, d.y);
        ctx.restore();
      }
    }

    // =========================================================
    // HUD更新
    // =========================================================
    function updateHUD() {
      const ch = activeChar();

      playerHpFill.style.width = ((ch.hp / ch.maxHp) * 100) + "%";
      playerHpText.textContent = `${Math.ceil(ch.hp)} / ${ch.maxHp}`;

      playerEnergyFill.style.width = (ch.energy) + "%";
      playerEnergyText.textContent = `${Math.floor(ch.energy)} / 100`;

      playerStaminaFill.style.width = (ch.stamina) + "%";
      playerStaminaText.textContent = `${Math.floor(ch.stamina)} / 100`;

      enemyHpFill.style.width = ((enemy.hp / enemy.maxHp) * 100) + "%";
      enemyHpText.textContent = `${Math.max(0, Math.ceil(enemy.hp))} / ${enemy.maxHp}`;

      partyPanel.innerHTML = "";
      for (let i = 0; i < party.length; i++) {
        const c = party[i];
        const div = document.createElement("div");
        div.className = "charCard" + (i === activeIndex ? " active" : "");
        div.innerHTML = `
          <div class="charName">
            ${c.name}
            <span class="tag ${c.element}">${elementName(c.element)}</span>
          </div>
          <div class="charMeta">
            HP: ${Math.ceil(c.hp)} / ${c.maxHp}<br>
            元素エネルギー: ${Math.floor(c.energy)} / 100<br>
            スキルCD: ${Math.ceil(c.skillCd / 60 * 10) / 10}s
          </div>
        `;
        partyPanel.appendChild(div);
      }
    }

    // =========================================================
    // メインループ
    // =========================================================
    function loop() {
      ctx.clearRect(0, 0, W(), H());

      const ch = activeChar();

      if (!bigMessage.classList.contains("show")) {
        if (ch && ch.hp > 0 && enemy.hp > 0) {
          updatePlayer(ch);
          updateEnemy();
          updateHitboxes();
          updateProjectiles();
          updateFields();
          updateParticles();
          updateDamageTexts();
          updatePartySync();
          checkGameState();
        } else {
          updateParticles();
          updateDamageTexts();
          if (consumePressed("r")) resetGame();
          checkGameState();
        }
      } else {
        updateParticles();
        updateDamageTexts();
        if (consumePressed("r")) resetGame();
      }

      drawBackground();
      drawFields();
      drawHitboxes();
      drawProjectiles();
      drawEnemy();
      for (let i = 0; i < party.length; i++) {
        if (i === activeIndex) drawCharacter(party[i], true);
      }
      drawParticles();
      drawDamageTexts();

      updateHUD();
      requestAnimationFrame(loop);
    }

    loop();

    // 初回ログ
    addLog("通常攻撃・スキル・爆発で元素を重ねよう");
    addLog("敵にも元素オーラが付く");
    addLog("Qで切り替えて反応を狙うと強い");
  </script>
</body>
</html>
